name = "portal-kiosk"
main = ".output/server/index.mjs"
compatibility_date = "2024-09-19"
compatibility_flags = ["nodejs_compat"]

# Custom domain: brodycountryclub.cogitations.com
# Add your zone_id and route after adding the domain in Cloudflare DNS.
# routes = [
#   { pattern = "brodycountryclub.cogitations.com", zone_name = "cogitations.com" }
# ]

# For local dev and default Workers host:
# workers_dev = true

# Static assets (logo, _nuxt/*) served before Worker; Worker handles pages/API
[assets]
directory = ".output/public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "portal-kiosk-db"
database_id = "placeholder-replace-with-real-id"

[vars]
# Set via .dev.vars locally; use wrangler secret put for production.
# NUXT_ADMIN_PASSWORD = ""
# NUXT_STATION_PASSWORD = ""
