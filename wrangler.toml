name = "portal-kiosk"
main = ".output/server/index.mjs"
compatibility_date = "2024-09-19"
compatibility_flags = ["nodejs_compat"]

# Custom domain: countryclub.cogitations.com
# Ensure `cogitations.com` is a Cloudflare zone and DNS has a proxied record for `countryclub`.
routes = [
  { pattern = "countryclub.cogitations.com/*", zone_name = "cogitations.com" }
]

# Publish to *.workers.dev; uncomment and set routes for custom domain.
workers_dev = true

# Static assets (logo, _nuxt/*) served before Worker; Worker handles pages/API
[assets]
directory = ".output/public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "portal-kiosk-db"
database_id = "f85042b7-e30f-4b65-bb43-086c9d063b5a"

[vars]
# Set via .dev.vars locally; use wrangler secret put for production.
# NUXT_ADMIN_PASSWORD = ""
# NUXT_STATION_PASSWORD = ""
